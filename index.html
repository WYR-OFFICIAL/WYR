<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WYR OLYMPICS | NEON EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syncopate:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --pink: #ff00e5; 
            --gold: #ffbd39;
            --bg: #030305; 
            --card-bg: rgba(15, 15, 20, 0.8);
            --border: rgba(0, 242, 255, 0.3);
            --glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            overflow-x: hidden; 
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(255, 0, 229, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.1) 0%, transparent 35%);
            background-attachment: fixed;
        }

        /* Scanline Effect */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* --- NAV BARS --- */
        .top-bar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(5, 5, 8, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .top-bar h2 { 
            font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 6px; 
            color: var(--cyan); text-shadow: var(--glow); 
            text-transform: uppercase;
        }

        .bottom-bar {
            position: fixed; bottom: 20px; left: 5%; width: 90%; height: 65px;
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-around; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .container { width: 90%; max-width: 450px; margin: 90px auto 110px; }
        .page { display: none; animation: slideIn 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        .active { display: block; }
        
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        /* --- CARDS & BUTTONS --- */
        .glass-card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px; padding: 25px; margin-bottom: 20px;
            position: relative; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .glass-card:hover::before { left: 100%; }

        h1 { 
            font-family: 'Syncopate'; font-weight: 700; font-size: 1.4rem; 
            text-align: center; margin-bottom: 30px; letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-main { 
            width: 100%; padding: 20px; border: none; border-radius: 18px;
            background: linear-gradient(135deg, var(--cyan), #00a2ff);
            color: #000; font-family: 'Orbitron'; font-weight: 900; 
            font-size: 0.9rem; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .btn-main:active { transform: scale(0.95); filter: brightness(1.2); }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; }
        .btn-sub { 
            background: rgba(255, 0, 229, 0.05); border: 1px solid var(--pink); 
            color: var(--pink); border-radius: 15px; padding: 15px 5px; 
            font-family: 'Orbitron'; font-weight: 700; font-size: 0.65rem; transition: 0.2s;
        }
        .btn-sub:active { background: var(--pink); color: white; }

        /* --- INPUTS --- */
        input, textarea { 
            width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 18px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            color: white; outline: none; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); }

        /* --- UPDATES --- */
        .update-notif { 
            background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px;
            margin-bottom: 15px; border-left: 4px solid var(--cyan); position: relative;
        }
        .update-notif p { font-size: 0.9rem; line-height: 1.5; color: #eee; }
        .update-time { font-size: 0.7rem; color: #666; margin-top: 10px; display: block; font-family: 'Orbitron'; }

        /* --- EVENT ITEMS --- */
        .event-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px; background: rgba(255,255,255,0.02);
            border-radius: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .status-chip { 
            padding: 10px 20px; border-radius: 12px; font-size: 0.7rem; 
            font-weight: 900; font-family: 'Orbitron'; cursor: pointer;
            background: #111; color: #444; border: 1px solid #222; transition: 0.4s;
        }
        .chip-active { 
            background: var(--cyan); color: #000; border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* --- RANKINGS --- */
        .rank-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent); 
            border-radius: 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .rank-number { font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900; width: 40px; }
        .rank-1 { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }

        details { background: rgba(0,0,0,0.3); border-radius: 18px; padding: 5px 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        summary { padding: 15px 0; font-family: 'Orbitron'; font-size: 0.8rem; color: var(--cyan); cursor: pointer; }

        .host-card {
            margin-top: 30px; text-align: center; border: 1px dashed rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="top-bar"><h2>WYR OLYMPICS</h2></div>

    <div class="container">
        <div id="loginPage" class="page">
            <h1 style="margin-top: 40px;">AUTHENTICATE</h1>
            <div class="glass-card">
                <input type="text" id="realName" placeholder="Real Name">
                <input type="text" id="nickName" placeholder="Agent Nickname">
                <button class="btn-main" onclick="registerUser()">INITIALIZE PROFILE</button>
            </div>
        </div>

        <div id="homePage" class="page">
            <h1>COMMAND HUB</h1>
            <button class="btn-main" onclick="showPage('registerEventPage')" style="height: 100px; font-size: 1.1rem; margin-bottom: 20px;">
                ENTER ARENA
            </button>
            
            <div class="nav-grid">
                <button class="btn-sub" onclick="showPage('infoPage')">INTEL</button>
                <button class="btn-sub" onclick="showPage('leaderboardPage')">RANKS</button>
                <button class="btn-sub" onclick="showPage('participantsPage')">ROSTER</button>
            </div>

            <div class="host-card">
                <p style="font-size: 0.6rem; color: #555; letter-spacing: 4px; margin-bottom: 5px;">DIRECTORS</p>
                <p style="font-family: 'Orbitron'; font-weight: 700; font-size: 1rem; color: #fff;">ISHAAN <span style="color:var(--pink)">&</span> YUVRAJ</p>
            </div>
        </div>

        <div id="infoPage" class="page">
            <p onclick="showPage('homePage')" style="color:#555; cursor:pointer; margin-bottom:20px; font-size:0.75rem; font-family:'Orbitron';"> < BACK</p>
            <h1>SITUATION ROOM</h1>
            <div class="glass-card">
                <h3 style="color:var(--pink); font-family:'Orbitron'; font-size:0.7rem; margin-bottom:20px; letter-spacing:2px;">LIVE INTEL FEED</h3>
                <div id="liveUpdates"></div>
                
                <div id="adminPanel" style="display:none; margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                    <textarea id="adminMsg" placeholder="Transmit new message..."></textarea>
                    <button class="btn-main" style="padding:15px; font-size:0.7rem;" onclick="postUpdate()">BROADCAST</button>
                </div>
            </div>
            <div class="glass-card" style="border: 1px solid rgba(255, 189, 57, 0.2);">
                <p style="font-size:0.8rem; color:#aaa; line-height:1.6;">
                    <b style="color:var(--gold)">PROTOCOLS:</b><br>
                    • Registration: +1 Point<br>
                    • Victory: +5 Points<br>
                    • Conduct: Honorable
                </p>
            </div>
        </div>

        <div id="leaderboardPage" class="page">
            <p onclick="showPage('homePage')" style="color:#555; cursor:pointer; margin-bottom:20px; font-size:0.75rem; font-family:'Orbitron';"> < BACK</p>
            <h1>HALL OF FAME</h1>
            <div id="leaderboardBody"></div>
        </div>

        <div id="participantsPage" class="page">
            <p onclick="showPage('homePage')" style="color:#555; cursor:pointer; margin-bottom:20px; font-size:0.75rem; font-family:'Orbitron';"> < BACK</p>
            <h1>UNIT ROSTER</h1>
            <div id="participantContent"></div>
        </div>

        <div id="registerEventPage" class="page">
            <p onclick="showPage('homePage')" style="color:#555; cursor:pointer; margin-bottom:20px; font-size:0.75rem; font-family:'Orbitron';"> < BACK</p>
            <h1 id="displayId" style="font-size: 1rem; color: var(--cyan);">AGENT: #---</h1>
            <div id="eventList"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div style="display:flex; flex-direction:column; align-items:center;">
            <div style="width:12px; height:4px; background:var(--cyan); border-radius:2px; margin-bottom:5px; box-shadow: 0 0 10px var(--cyan);"></div>
            <span id="footerUser" style="font-family:'Orbitron'; font-size:0.6rem; letter-spacing:1px;">OFFLINE</span>
        </div>
        <div id="footerID" style="color:var(--pink); font-family:'Orbitron'; font-size:0.8rem; font-weight:900; letter-spacing:2px;">#000</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, updateDoc, collection, onSnapshot, query, orderBy, getDocs, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const EVENT_NAMES = ["Gaming Clash", "Speed Logic", "Mystery Task", "Skill Shot", "Final Showdown"];
    const firebaseConfig = {
        apiKey: "AIzaSyCz9cM7bUCAJnW2cr0qIZxaS60mWgRVAyM",
        authDomain: "wyr-olympics.firebaseapp.com",
        projectId: "wyr-olympics",
        storageBucket: "wyr-olympics.firebasestorage.app",
        messagingSenderId: "5860419843",
        appId: "1:5860419843:web:45f65b48d42c36850ae136"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let currentUser = JSON.parse(localStorage.getItem('wyr_user')) || null;

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'participantsPage') loadParticipants();
        if(id === 'leaderboardPage') loadLeaderboard();
        if(id === 'infoPage') {
            loadUpdates();
            if(currentUser && (currentUser.nickName === "SageGod" || currentUser.nickName === "Sagegod")) {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }
        window.scrollTo(0,0);
    };

    if (currentUser) { showPage('homePage'); updateUI(); } else { showPage('loginPage'); }

    window.registerUser = async () => {
        const rName = document.getElementById('realName').value.trim();
        const nName = document.getElementById('nickName').value.trim();
        if(!rName || !nName) return alert("Identify yourself!");
        const snap = await getDocs(collection(db, "players"));
        const id = (snap.size + 1).toString().padStart(3, '0'); 
        const user = { realName: rName, nickName: nName, id: id, points: 0, events: {e0:false, e1:false, e2:false, e3:false, e4:false} };
        await setDoc(doc(db, "players", id), user);
        localStorage.setItem('wyr_user', JSON.stringify(user));
        currentUser = user;
        showPage('homePage'); updateUI();
    };

    function updateUI() {
        if(!currentUser) return;
        document.getElementById('footerUser').innerText = currentUser.nickName.toUpperCase();
        document.getElementById('footerID').innerText = "#" + currentUser.id;
        document.getElementById('displayId').innerText = "AGENT: #" + currentUser.id;
        renderEvents();
    }

    function renderEvents() {
        const list = document.getElementById('eventList');
        if(!list) return; list.innerHTML = '';
        EVENT_NAMES.forEach((name, i) => {
            const isPart = currentUser.events['e'+i];
            list.innerHTML += `<div class="event-item">
                <span style="font-weight:600; font-family:'Orbitron'; font-size:0.8rem;">${name}</span>
                <div onclick="toggleEvent(${i})" class="status-chip ${isPart ? 'chip-active' : ''}">
                    ${isPart ? 'DEPLOYED' : 'JOIN'}
                </div>
            </div>`;
        });
    }

    window.toggleEvent = async (num) => {
        const key = 'e' + num; const status = !currentUser.events[key];
        currentUser.points += status ? 1 : -1; currentUser.events[key] = status;
        await updateDoc(doc(db, "players", currentUser.id), { points: currentUser.points, [`events.${key}`]: status });
        localStorage.setItem('wyr_user', JSON.stringify(currentUser)); renderEvents();
    };

    function loadUpdates() {
        onSnapshot(query(collection(db, "updates"), orderBy("time", "desc")), (snap) => {
            const div = document.getElementById('liveUpdates'); div.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                const isSage = currentUser && (currentUser.nickName === "SageGod" || currentUser.nickName === "Sagegod");
                div.innerHTML += `<div class="update-notif">
                    <p>${data.msg}</p>
                    <span class="update-time">${data.time ? data.time.toDate().toLocaleString() : 'Just Now'}</span>
                    ${isSage ? `<button onclick="deletePost('${d.id}')" style="background:none; border:none; color:var(--pink); font-size:0.6rem; margin-top:10px; cursor:pointer; font-family:'Orbitron';">[ TERMINATE ]</button>` : ''}
                </div>`;
            });
        });
    }

    window.postUpdate = async () => {
        const msg = document.getElementById('adminMsg').value; if(!msg) return;
        await addDoc(collection(db, "updates"), { msg: msg, time: serverTimestamp() });
        document.getElementById('adminMsg').value = '';
    };

    window.deletePost = async (id) => { if(confirm("Terminate Broadcast?")) await deleteDoc(doc(db, "updates", id)); };

    function loadParticipants() {
        onSnapshot(collection(db, "players"), (snap) => {
            let html = ''; const players = snap.docs.map(d => d.data());
            EVENT_NAMES.forEach((name, i) => {
                const joined = players.filter(p => p.events['e'+i]);
                html += `<details><summary>${name.toUpperCase()} (${joined.length})</summary>
                    <div style="padding:10px 0;">
                    ${joined.length > 0 ? joined.map(p => `<div style="font-size:0.8rem; padding:12px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between;"><span>${p.nickName}</span><span style="color:#555;">#${p.id}</span></div>`).join('') : '<div style="font-size:0.7rem; color:#444;">NO ACTIVE AGENTS</div>'}
                    </div></details>`;
            });
            document.getElementById('participantContent').innerHTML = html;
        });
    }

    function loadLeaderboard() {
        onSnapshot(query(collection(db, "players"), orderBy("points", "desc")), (snap) => {
            let html = ''; let r = 1;
            snap.forEach(doc => {
                const p = doc.data();
                const rankClass = r <= 3 ? `rank-${r}` : '';
                html += `<div class="rank-row">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <span class="rank-number ${rankClass}">0${r}</span>
                        <span style="font-weight:600; font-size:0.9rem;">${p.nickName}</span>
                    </div>
                    <span style="color:var(--pink); font-family:'Orbitron'; font-weight:700; font-size:0.8rem;">${p.points} <small>XP</small></span>
                </div>`;
                r++;
            });
            document.getElementById('leaderboardBody').innerHTML = html;
        });
    }
</script>
</body>
</html>
